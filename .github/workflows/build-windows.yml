name: Build Windows EXE (Wails3)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # 3. 安装 Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 4. 安装 Wails3 CLI
      - name: Install Wails3
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          echo "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend deps (clean)
        run: |
          cd frontend
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
          if (Test-Path package-lock.json) { Remove-Item -Force package-lock.json }
          npm install
          cd ..

      # 6. 构建 Windows EXE
      - name: Build Windows
        env:
            CGO_ENABLED: 1
        run: |
          wails3 package

      # 7. 查看产物（调试用，可删）
      - name: List build output
        run: |
          Get-ChildItem -Recurse build

      # 8. 上传 EXE
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/bin/*.exe
